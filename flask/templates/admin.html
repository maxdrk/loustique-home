<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Loustiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --surface: #181818;
            --surface2: #222222;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.18);
            --text: #f0ede8;
            --muted: #888880;
            --accent: #c8f060;
            --accent-dim: rgba(200,240,96,0.12);
            --danger: #ff5f57;
            --danger-dim: rgba(255,95,87,0.12);
            --success: #30d158;
            --success-dim: rgba(48,209,88,0.1);
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
        }

        aside {
            width: 220px;
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.25rem;
            position: fixed;
            top: 0; left: 0; bottom: 0;
        }

        .logo {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo span {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.06em;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13.5px;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 2px;
            transition: all 0.15s;
        }

        nav a.active, nav a:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        nav a svg { width: 15px; height: 15px; flex-shrink: 0; }

        .sidebar-footer {
            margin-top: auto;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        main {
            margin-left: 220px;
            flex: 1;
            padding: 2.5rem 3rem;
            max-width: 900px;
        }

        .page-header {
            margin-bottom: 2.5rem;
        }

        .page-header h1 {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 14px;
            color: var(--muted);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px 14px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 7px;
            border: none;
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f0f0f;
            font-weight: 700;
        }

        .btn-primary:hover { background: #d4f570; }

        .btn-danger {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid rgba(255,95,87,0.2);
        }

        .btn-danger:hover { background: rgba(255,95,87,0.2); }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }

        .user-list { display: flex; flex-direction: column; gap: 0; }

        .user-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            gap: 14px;
            transition: background 0.1s;
        }

        .user-row:last-child { border-bottom: none; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(200,240,96,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .user-info { flex: 1; }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
        }

        .user-meta {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
        }

        .badge {
            font-size: 10px;
            font-family: var(--mono);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }

        .badge-admin {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(200,240,96,0.2);
        }

        .badge-user {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 13px;
            font-family: var(--mono);
            color: var(--text);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(48,209,88,0.3); color: var(--success); }
        .toast.error { border-color: rgba(255,95,87,0.3); color: var(--danger); }

        .strength-bar {
            height: 3px;
            background: var(--surface2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>

<aside>
    <div class="logo">
        Loustiques
        <span>panneau admin</span>
    </div>
    <nav>
        <a href="#" class="active">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.76 2.24-5 5-5s5 2.24 5 5"/></svg>
            Utilisateurs
        </a>
        <a href="admin/logs">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5h6M5 11h4"/></svg>
            Logs
        </a>
        <a href="#">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>
            Système
        </a>
    </nav>
    <div class="sidebar-footer">
        v0.1.0 — local
    </div>
</aside>

<main>
    <div class="page-header">
        <h1>utilisateurs</h1>
        <p>Créer et gérer les comptes d'accès.</p>
    </div>

    <div class="card">
        <div class="card-title">Créer un utilisateur</div>
        <div class="form-grid">
            <div class="form-group">
                <label>nom d'utilisateur</label>
                <input type="text" id="new-username" placeholder="ex: maxime" autocomplete="off">
            </div>
            <div class="form-group">
                <label>rôle</label>
                <select id="new-role" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;width:100%;appearance:none;">
                    <option value="user">user</option>
                    <option value="admin">admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>mot de passe</label>
                <input type="password" id="new-password" placeholder="••••••••" oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            </div>
            <div class="form-group">
                <label>confirmer</label>
                <input type="password" id="confirm-password" placeholder="••••••••">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="createUser()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
                Créer le compte
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Comptes existants</div>
        <div class="user-list" id="user-list">
            <div class="user-row">
                <div class="avatar">MA</div>
                <div class="user-info">
                    <div class="user-name">maxime</div>
                    <div class="user-meta">créé le 24/03/2026</div>
                </div>
                <span class="badge badge-admin">admin</span>
                <button class="btn btn-danger" onclick="deleteUser(this, 'maxime')">Supprimer</button>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
}

function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#ff5f57', '#ff9f0a', '#ffd60a', '#30d158'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score - 1] || 'transparent';
}

function createUser() {
    const username = document.getElementById('new-username').value.trim();
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const role = document.getElementById('new-role').value;

    if (!username || !password) return showToast('Champs manquants', 'error');
    if (password !== confirm) return showToast('Mots de passe différents', 'error');
    if (password.length < 6) return showToast('Mot de passe trop court', 'error');

    fetch('/admin/add_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast(`Compte "${username}" créé`, 'success');
            addUserRow(username, role);
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('strength-fill').style.width = '0%';
        } else {
            showToast(data.message || 'Erreur', 'error');
        }
    })
    .catch(() => showToast('Erreur réseau', 'error'));
}
function loadUsers() {
    fetch('/admin/get_users')
        .then(r => r.json())
        .then(data => {
            if (!data.success) return;
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            data.users.forEach(u => addUserRow(u.username, u.role, u.created_at));
        });
}

loadUsers(); 
function addUserRow(username, role) {
    const initials = username.slice(0, 2).toUpperCase();
    const today = new Date().toLocaleDateString('fr-FR');
    const list = document.getElementById('user-list');
    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `
        <div class="avatar">${initials}</div>
        <div class="user-info">
            <div class="user-name">${username}</div>
            <div class="user-meta">créé le ${today}</div>
        </div>
        <span class="badge badge-${role}">${role}</span>
        <button class="btn btn-danger" onclick="deleteUser(this, '${username}')">Supprimer</button>
    `;
    list.appendChild(row);
}

function deleteUser(btn, username) {
    if (!confirm(`Supprimer "${username}" ?`)) return;
    fetch('/admin/delete_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            btn.closest('.user-row').remove();
            showToast(`Compte "${username}" supprimé`);
        } else {
            showToast(data.message || 'Erreur', 'error');
        }
    })
    .catch(() => showToast('Erreur réseau', 'error'));
}
</script>

</body>
</html>
